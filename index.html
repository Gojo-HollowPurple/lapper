<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAPPER | The Fortress Global</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0a0a0a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        nav { background: #ffcc00; color: #000; width: 100%; padding: 15px; font-weight: bold; font-size: 28px; text-align: center; box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3); }
        .auth-container, .main-app { max-width: 600px; width: 95%; margin-top: 20px; text-align: center; }
        .card { background: #1a1a1a; border: 1px solid #333; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; box-sizing: border-box; font-family: inherit; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-primary { background: #ffcc00; color: #000; }
        .btn-secondary { background: #333; color: #fff; }
        .btn-tab { background: transparent; border: 1px solid #ffcc00; color: #ffcc00; width: auto; padding: 5px 15px; margin: 5px; }
        .btn-tab.active { background: #ffcc00; color: #000; }
        .hidden { display: none; }
        .profile-badge { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #ffcc00; }
        .inbox-item { background: #222; padding: 10px; margin: 5px 0; border-radius: 8px; cursor: pointer; border: 1px solid #444; text-align: left; display: flex; align-items: center; justify-content: space-between; }
        .comm-card { text-align: left; background: #111; border-left: 4px solid #ffcc00; padding: 15px; margin-bottom: 15px; border-radius: 0 10px 10px 0; }
    </style>
</head>
<body>

<nav>LAPPER</nav>

<div id="auth-section" class="auth-container">
    <div class="card">
        <h2>Enter the Fortress</h2>
        <input type="text" id="reg-username" placeholder="Pick a Username">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button class="btn-primary" onclick="signUp()">CREATE ACCOUNT</button>
        <button class="btn-secondary" onclick="signIn()">LOGIN</button>
    </div>
</div>

<div id="app-section" class="main-app hidden">
    <div class="profile-badge">
        <img id="my-avatar" class="avatar" src="">
        <div id="user-info"><span id="user-display-name" style="color:#ffcc00; font-weight: bold;"></span></div>
        <button class="btn-secondary" style="width: auto; font-size: 10px; padding: 5px;" onclick="signOut()">Logout</button>
    </div>

    <div style="margin: 10px 0;">
        <button class="btn-tab active" id="tab-laps" onclick="switchTab('laps')">LAPS</button>
        <button class="btn-tab" id="tab-comms" onclick="switchTab('comms')">COMMUNITIES</button>
        <button class="btn-tab" id="tab-dms" onclick="switchTab('dms')">DMs</button>
    </div>

    <div id="section-laps">
        <div class="card">
            <textarea id="lap-input" placeholder="Update the prophecy..." maxlength="100"></textarea>
            <button class="btn-primary" onclick="postLap()">SEND LAP</button>
        </div>
        <div class="card">
            <div id="current-lap-text">Watching the skies...</div>
            <p style="color: #666; font-size: 12px;">By: <span id="lap-author">...</span></p>
        </div>
    </div>

    <div id="section-comms" class="hidden">
        <div class="card">
            <h3>Create Group</h3>
            <input type="text" id="new-comm-name" placeholder="Group Name">
            <textarea id="new-comm-desc" placeholder="What is this place? (Description)" maxlength="150" style="height: 60px;"></textarea>
            <select id="new-comm-privacy">
                <option value="true">Public (Everyone)</option>
                <option value="false">Private (Hidden)</option>
            </select>
            <button class="btn-primary" onclick="createCommunity()">FORGE COMMUNITY</button>
        </div>
        <div class="card">
            <h3>Explore</h3>
            <div id="community-list">Scanning frequencies...</div>
        </div>
    </div>

    <div id="section-dms" class="hidden">
        <div class="card" id="dm-inbox-section">
            <h3>Inbox</h3>
            <div id="dm-inbox">No messages yet.</div>
            <hr style="border: 0.1px solid #333;">
            <input type="text" id="search-username" placeholder="Search Username...">
            <button class="btn-primary" onclick="searchUser()">START NEW CHAT</button>
        </div>
        <div id="chat-container" class="card hidden">
            <h4 id="chat-with-name">Chat</h4>
            <div id="chat-window" style="background:#000; padding:15px; border-radius:10px; height:250px; overflow-y:auto; text-align:left; display:flex; flex-direction:column;"></div>
            <input type="text" id="dm-input" placeholder="Secret message...">
            <button class="btn-primary" onclick="sendDM()">SEND</button>
            <button class="btn-secondary" onclick="closeChat()">Back to Inbox</button>
        </div>
    </div>
</div>

<script>
    const supabaseUrl = 'https://plvwvjjpgfwrzfphafsz.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBsdnd2ampwZ2Z3cnpmcGhhZnN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMDE2OTcsImV4cCI6MjA5Mjg3NzY5N30.uMSHEPD0_H5OsshKumdY5gatFCLjpe9uYNQEN12UyLE';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    let myProfile = null;
    let activeChatId = null;

    // --- AUTH ---
    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (user) {
            const { data: profile } = await _supabase.from('profiles').select('*').eq('id', user.id).single();
            myProfile = profile;
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            document.getElementById('user-display-name').innerText = profile?.username || "Lapper";
            document.getElementById('my-avatar').src = profile?.avatar_url || "";
            fetchLatestLap();
            fetchInbox();
            fetchCommunities();
            setupRealtime();
        }
    }

    // --- REALTIME ---
    function setupRealtime() {
        _supabase.channel('global_fortress')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'laps' }, p => updateLapUI(p.new))
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'communities' }, () => fetchCommunities())
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'direct_messages' }, p => {
            if (activeChatId && (p.new.sender_id === activeChatId || p.new.receiver_id === activeChatId)) loadDMs();
            fetchInbox();
        }).subscribe();
    }

    // --- COMMUNITIES ---
    async function createCommunity() {
        const name = document.getElementById('new-comm-name').value.trim();
        const desc = document.getElementById('new-comm-desc').value.trim();
        const isPublic = document.getElementById('new-comm-privacy').value === "true";

        if (!name) return alert("Community needs a name!");

        const { error } = await _supabase.from('communities').insert([{ 
            name, 
            description: desc, 
            is_public: isPublic, 
            owner_id: myProfile.id 
        }]);

        if (error) alert(error.message);
        else {
            document.getElementById('new-comm-name').value = '';
            document.getElementById('new-comm-desc').value = '';
            fetchCommunities();
        }
    }

    async function fetchCommunities() {
        // Fetch all public ones, or any private ones you own
        const { data } = await _supabase.from('communities')
            .select('*')
            .or(`is_public.eq.true,owner_id.eq.${myProfile.id}`)
            .order('created_at', { ascending: false });

        const list = document.getElementById('community-list');
        if (data && data.length > 0) {
            list.innerHTML = data.map(c => `
                <div class="comm-card" style="border-color: ${c.is_public ? '#ffcc00' : '#ff4444'}">
                    <div style="display:flex; justify-content:space-between;">
                        <strong># ${c.name}</strong>
                        <span style="font-size:10px; color:#666;">${c.is_public ? 'PUBLIC' : 'PRIVATE'}</span>
                    </div>
                    <p style="font-size:13px; color:#bbb; margin: 8px 0;">${c.description || 'No description.'}</p>
                    <button class="btn-tab" style="width:100%; margin:0;" onclick="alert('Chat room coming next!')">ENTER</button>
                </div>
            `).join('');
        } else {
            list.innerHTML = "The world is empty. Build something.";
        }
    }

    // --- LAPS, DMs, & TABS (Standard Logic) ---
    async function postLap() {
        const content = document.getElementById('lap-input').value;
        if (content) await _supabase.from('laps').insert([{ content, email: myProfile.username }]);
        document.getElementById('lap-input').value = '';
    }
    async function fetchLatestLap() {
        const { data } = await _supabase.from('laps').select('*').order('created_at', { ascending: false }).limit(1);
        if (data?.[0]) updateLapUI(data[0]);
    }
    function updateLapUI(lap) {
        document.getElementById('current-lap-text').innerText = `"${lap.content}"`;
        document.getElementById('lap-author').innerText = lap.email;
    }
    function switchTab(tab) {
        ['laps', 'comms', 'dms'].forEach(t => {
            document.getElementById(`section-${t}`).classList.add('hidden');
            document.getElementById(`tab-${t}`).classList.remove('active');
        });
        document.getElementById(`section-${tab}`).classList.remove('hidden');
        document.getElementById(`tab-${tab}`).classList.add('active');
    }
    async function fetchInbox() {
        if (!myProfile) return;
        const { data } = await _supabase.from('direct_messages').select('sender_id, receiver_id').or(`sender_id.eq.${myProfile.id},receiver_id.eq.${myProfile.id}`);
        if (data) {
            const ids = [...new Set(data.flatMap(d => [d.sender_id, d.receiver_id]))].filter(id => id !== myProfile.id);
            if (ids.length > 0) {
                const { data: profs } = await _supabase.from('profiles').select('id, username').in('id', ids);
                document.getElementById('dm-inbox').innerHTML = profs.map(p => `<div class="inbox-item" onclick="openChat('${p.id}', '${p.username}')"><span>${p.username}</span><span>→</span></div>`).join('');
            }
        }
    }
    async function openChat(id, name) {
        activeChatId = id;
        document.getElementById('chat-with-name').innerText = `Chat with ${name}`;
        document.getElementById('dm-inbox-section').classList.add('hidden');
        document.getElementById('chat-container').classList.remove('hidden');
        loadDMs();
    }
    function closeChat() {
        activeChatId = null;
        document.getElementById('dm-inbox-section').classList.remove('hidden');
        document.getElementById('chat-container').classList.add('hidden');
    }
    async function loadDMs() {
        const { data } = await _supabase.from('direct_messages').select('*').or(`and(sender_id.eq.${myProfile.id},receiver_id.eq.${activeChatId}),and(sender_id.eq.${activeChatId},receiver_id.eq.${myProfile.id})`).order('created_at', { ascending: true });
        const win = document.getElementById('chat-window');
        win.innerHTML = data ? data.map(m => `<div style="align-self: ${m.sender_id === myProfile.id ? 'flex-end' : 'flex-start'}; color:${m.sender_id === myProfile.id ? '#ffcc00' : '#fff'}"><b>${m.sender_id === myProfile.id ? 'Me' : 'Them'}:</b> ${m.content}</div>`).join('') : "";
        win.scrollTop = win.scrollHeight;
    }
    async function sendDM() {
        const content = document.getElementById('dm-input').value;
        if (content && activeChatId) await _supabase.from('direct_messages').insert([{ sender_id: myProfile.id, receiver_id: activeChatId, content }]);
        document.getElementById('dm-input').value = '';
        loadDMs();
    }
    async function searchUser() {
        const target = document.getElementById('search-username').value;
        const { data } = await _supabase.from('profiles').select('id, username').eq('username', target).single();
        if (data) openChat(data.id, data.username); else alert("User not found!");
    }
    async function signUp() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const username = document.getElementById('reg-username').value.trim();
        const { data, error } = await _supabase.auth.signUp({ email, password });
        if (error) return alert(error.message);
        if (data.user) { await _supabase.from('profiles').insert([{ id: data.user.id, username }]); alert("Account created!"); }
    }
    async function signIn() {
        const { error } = await _supabase.auth.signInWithPassword({ email: document.getElementById('email').value, password: document.getElementById('password').value });
        if (error) alert(error.message); else checkUser();
    }
    async function signOut() { await _supabase.auth.signOut(); location.reload(); }
    
    checkUser();
</script>
</body>
</html>
